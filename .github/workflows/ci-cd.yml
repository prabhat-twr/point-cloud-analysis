name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run build
      run: npm run build
      
    - name: Test static file serving
      run: |
        # Start the server in background
        npm start &
        SERVER_PID=$!
        
        # Wait for server to start
        sleep 5
        
        # Test if server is responding
        curl -f http://localhost:8080 > /dev/null || exit 1
        
        # Test if main assets are accessible
        curl -f http://localhost:8080/styles.css > /dev/null || exit 1
        curl -f http://localhost:8080/app.js > /dev/null || exit 1
        
        # Stop the server
        kill $SERVER_PID
        
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: static-files
        path: |
          index.html
          styles.css
          app.js
          sample.xyz
          sample.stl
          README.md

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    permissions:
      contents: read
      pages: write
      id-token: write
      
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
      
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Pages
      uses: actions/configure-pages@v4
      
    - name: Upload to GitHub Pages
      uses: actions/upload-pages-artifact@v3
      with:
        path: '.'
        
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4